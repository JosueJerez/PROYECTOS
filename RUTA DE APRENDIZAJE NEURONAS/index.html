<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Neural Knowledge Graph v2.2</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --bg: #050505; }
        body { margin: 0; background-color: var(--bg); color: white; font-family: 'Roboto Mono', monospace; overflow: hidden; }

        #controls {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(10, 10, 10, 0.95); padding: 20px; border-radius: 15px;
            border: 2px solid var(--primary); width: 240px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        #note-panel {
            position: absolute; top: 20px; right: -400px; z-index: 100;
            background: rgba(10, 10, 10, 0.95); padding: 20px; border-radius: 15px;
            border: 2px solid var(--secondary); width: 320px; height: 85vh;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #note-panel.active { right: 20px; }

        h3 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 14px; margin: 0 0 15px 0; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        input, select, button, textarea {
            background: rgba(20, 20, 20, 1); border: 1px solid #444;
            color: white; padding: 12px; margin: 8px 0; display: block;
            width: 100%; border-radius: 8px; box-sizing: border-box; font-family: 'Roboto Mono';
        }

        button { 
            cursor: pointer; background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            border: none; font-weight: bold; color: white; text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* ESTILO DE LAS LÍNEAS Y NODOS */
        .link { stroke: var(--primary); stroke-opacity: 0.8; stroke-width: 2px; filter: drop-shadow(0 0 5px var(--primary)); }
        .node-circle { cursor: pointer; stroke: #fff; stroke-width: 2px; filter: drop-shadow(0 0 8px currentColor); }
        .node-text { pointer-events: none; font-size: 12px; fill: white; font-family: 'Orbitron'; font-weight: bold; text-shadow: 2px 2px 4px #000; }

        #graph-container { width: 100vw; height: 100vh; cursor: grab; }
        #graph-container:active { cursor: grabbing; }
    </style>
</head>
<body>

    <div id="controls">
        <h3>NEURO-ENLACE</h3>
        <input type="text" id="nodeName" placeholder="Concepto aprendido...">
        <label style="font-size: 10px; color: var(--primary);">CONECTAR A:</label>
        <select id="parentNode"></select>
        <button onclick="addNewNode()">Inyectar Neurona</button>
        <button onclick="resetBrain()" style="background: none; border: 1px solid #ff4444; color: #ff4444; font-size: 10px; margin-top: 30px;">Reiniciar Todo</button>
    </div>

    <div id="note-panel">
        <h3 id="note-title">Apuntes</h3>
        <textarea id="note-content" placeholder="¿Qué aprendiste sobre esto?"></textarea>
        <button onclick="saveNote()">Guardar Conocimiento</button>
        <button onclick="closePanel()" style="background: #222; margin-top: 10px;">Cerrar</button>
    </div>

    <div id="graph-container"></div>

    <script src="brain.js"></script>
</body>
</html>
